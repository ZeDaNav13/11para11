<article class="article-wrap">
  <header class="article-header">
    <img src="{{ARTICLE_COVER}}" alt="{{ARTICLE_TITLE}}">
    <h2 class="article-title">{{ARTICLE_TITLE}}</h2>
    <p class="article-byline">
      <span class="article-byline-main">
        <a class="article-byline-author" href="{{AUTHOR_URL}}">{{AUTHOR_NAME}}</a>
        <span class="card-dot">•</span>
        <span class="article-byline-date">{{ARTICLE_DATE}}</span>
      </span>
      <span class="article-byline-category">
        <a class="category-pill" href="{{CATEGORY_URL}}">{{ARTICLE_CATEGORY}}</a>
      </span>
    </p>
  </header>
  <section class="article-content">
    {{ARTICLE_BODY}}
  </section>
  <div class="mobile-card-scroll">
    <aside class="author-card">
      <div class="author-card-head">
        <h3><a class="author-link" href="{{AUTHOR_URL}}">{{AUTHOR_NAME}}</a></h3>
        <a class="author-jump" href="{{AUTHOR_URL}}" aria-label="Abrir página do autor">&gt;&gt;&gt;&gt;</a>
      </div>
      <div class="author-recent-row">
        <div class="author-recent">
          {{AUTHOR_RECENT}}
        </div>
      </div>
    </aside>
  </div>
  <div class="mobile-card-scroll" data-mobile-start="end">
    <aside class="category-card">
      <div class="author-card-head">
        <a class="author-jump" href="{{CATEGORY_URL}}" aria-label="Abrir página da categoria">&lt;&lt;&lt;&lt;</a>
        <h3><a class="author-link" href="{{CATEGORY_URL}}">{{ARTICLE_CATEGORY}}</a></h3>
      </div>
      <div class="author-recent-row">
        <div class="author-recent">
          {{CATEGORY_RECENT}}
        </div>
      </div>
    </aside>
  </div>
</article>
