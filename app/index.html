<!doctype html>
<html lang="pt-PT">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="./styles.css">

<body>
  <div class="app-bg" aria-hidden="true"></div>
  <header class="topbar">

    <h1>11PARA11</h1>

    <div class="backoffice-links">
      <a class="backoffice-link" href="./backoffice-authors.html">Backoffice autores</a>
      <a class="backoffice-link" href="./backoffice-articles.html">Backoffice artigos</a>

  <main class="content">

  <nav class="tabbar" aria-label="Navegação">
